name: Build Zirconium (nvidia)

permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 1 * * TUE"
  merge_group:
  workflow_dispatch:
    inputs:
      enable-terra:
        description: "Enable Terra repository packages"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build-bootc.yaml
    secrets: inherit
    with:
      image-name: zirconium-nvidia
      platforms: amd64,arm64
      profiles: nvidia
      cleanup_action: true
      rechunk: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
      publish: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
      enable-terra: ${{ github.event_name == 'workflow_dispatch' && inputs.enable-terra != false || github.event_name != 'workflow_dispatch' }}

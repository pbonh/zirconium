[Match]
Distribution=fedora

[Build]
SandboxTrees=repos/terra.repo:/etc/yum.repos.d/terra.repo
SandboxTrees=repos/terra-extras.repo:/etc/yum.repos.d/terra-extras.repo

[Distribution]
Repositories=terra
Repositories=terra-extras

[Content]
WithRecommends=false
Packages=
    atuin
    carapace
    iio-niri
    maple-fonts
    nu
    satty
    syncthing
    terra-release
    terra-release-extras
    valent
    xdg-terminal-exec-nautilus
    zed

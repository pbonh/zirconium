[Match]
Distribution=fedora

[Content]
Packages=
    # Development tools
    glibc-devel
    libstdc++-devel
    gcc-g++
    make
    # Editors and terminals
    kitty
    neovim
    # CLI tools
    ansible
    fd-find
    ripgrep
    zsh
    # Container/VM tools
    distrobox
    fuse
    fuse3
    # Desktop apps
    libreoffice
    thunderbird
    # Science
    octave
    # Runtime for Codex
    nodejs
    npm
